<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Trendy Threads</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />


    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">


    <header class="bg-indigo-600 text-white py-6 shadow">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-3xl font-bold">Trendy Threads</h1>
            <div class="space-x-4">
                <a href="products.html" class="bg-white text-indigo-600 px-4 py-2 rounded font-semibold hover:bg-gray-200">
          Products
        </a>
                <a href="dashboard.html" class="bg-yellow-400 text-black px-4 py-2 rounded font-semibold hover:bg-yellow-300">
          Dashboard
        </a>
            </div>
        </div>
    </header>


    <section class="max-w-6xl mx-auto px-4 py-10 text-center">
        <h2 class="text-4xl font-bold mb-4">Manage Your Store Smarter</h2>
        <p class="text-lg text-gray-600">
            Track trending products, manage inventory, and monitor orders with ease.
        </p>
    </section>


    <section class="max-w-6xl mx-auto px-4 py-6">
        <h3 class="text-2xl font-bold mb-6 text-center">🔥Trending Products</h3>

        <div id="trendingProducts" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        </div>
    </section>


    <footer class="bg-gray-800 text-white text-center py-4 mt-10">
        <p>© 2026 Trendy Threads | Inventory Dashboard</p>
    </footer>


    <script>
        const API_URL = "http://localhost:8080/products";

        fetch(API_URL)
            .then(res => res.json())
            .then(products => {


                products.sort((a, b) => b.sold - a.sold);


                const trending = products.slice(0, 3);
                const container = document.getElementById("trendingProducts");

                trending.forEach(product => {
                    const card = document.createElement("div");

                    card.className =
                        "bg-white rounded-lg shadow hover:shadow-lg transition overflow-hidden";

                    card.innerHTML = `
            
            <img 
              src="${product.image}" 
              alt="${product.name}" 
              class="w-full h-48 object-cover"
            />

           
            <div class="p-4 text-left">
              <h4 class="text-lg font-semibold mb-1">${product.name}</h4>
              <p class="text-gray-600">Price: ₹${product.price}</p>
              <p class="text-green-600 font-semibold">Sold: ${product.sold}</p>
            </div>
          `;

                    container.appendChild(card);
                });
            })
            .catch(err => console.error("Error loading products:", err));
    </script>

</body>

</html>
