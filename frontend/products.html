<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Products | Trendy Threads</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />


    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">


    <header class="bg-indigo-600 text-white py-5 shadow">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">Trendy Threads – Products</h1>
            <div class="space-x-4">
                <a href="index.html" class="bg-white text-indigo-600 px-3 py-2 rounded font-semibold hover:bg-gray-200">
          Home
        </a>
                <a href="dashboard.html" class="bg-yellow-400 text-black px-3 py-2 rounded font-semibold hover:bg-yellow-300">
          Dashboard
        </a>
            </div>
        </div>
    </header>


    <section class="max-w-6xl mx-auto px-4 py-6">
        <div class="flex flex-col md:flex-row gap-4 justify-between">
            <input type="text" id="searchInput" placeholder="Search product..." class="border rounded px-4 py-2 w-full md:w-1/3" />

            <select id="sortSelect" class="border rounded px-4 py-2 w-full md:w-1/4">
        <option value="">Sort By</option>
        <option value="priceAsc">Price: Low → High</option>
        <option value="priceDesc">Price: High → Low</option>
        <option value="stockAsc">Stock: Low → High</option>
        <option value="stockDesc">Stock: High → Low</option>
      </select>
        </div>
    </section>


    <section class="max-w-6xl mx-auto px-4 pb-10">
        <div id="productContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
    </section>


    <script>
        const API_URL = "http://localhost:8080/products";
        let allProducts = [];

        const container = document.getElementById("productContainer");
        const searchInput = document.getElementById("searchInput");
        const sortSelect = document.getElementById("sortSelect");


        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                allProducts = data;
                renderProducts(allProducts);
            })
            .catch(err => console.error("Error loading products:", err));


        function renderProducts(products) {
            container.innerHTML = "";

            products.forEach(p => {
                const lowStock = p.stock < 20;

                const card = document.createElement("div");
                card.className =
                    "bg-white rounded-lg shadow hover:shadow-lg transition overflow-hidden";

                card.innerHTML = `
          
          <img 
            src="${p.image}" 
            alt="${p.name}" 
            class="w-full h-48 object-cover"
          />

          
          <div class="p-4">
            <h3 class="text-lg font-semibold mb-1">${p.name}</h3>

            <p>
              Price:
              <span class="font-semibold">₹${p.price}</span>
            </p>

            <p class="${
              lowStock ? "text-red-600 font-bold" : "text-green-600"
            }">
              Stock: ${p.stock} ${lowStock ? "(Low Stock!)" : ""}
            </p>

            <p class="text-gray-600">Sold: ${p.sold}</p>
          </div>
        `;

                container.appendChild(card);
            });
        }


        searchInput.addEventListener("input", () => {
            const value = searchInput.value.toLowerCase();
            const filtered = allProducts.filter(p =>
                p.name.toLowerCase().includes(value)
            );
            renderProducts(filtered);
        });


        sortSelect.addEventListener("change", () => {
            let sorted = [...allProducts];

            switch (sortSelect.value) {
                case "priceAsc":
                    sorted.sort((a, b) => a.price - b.price);
                    break;
                case "priceDesc":
                    sorted.sort((a, b) => b.price - a.price);
                    break;
                case "stockAsc":
                    sorted.sort((a, b) => a.stock - b.stock);
                    break;
                case "stockDesc":
                    sorted.sort((a, b) => b.stock - a.stock);
                    break;
            }

            renderProducts(sorted);
        });
    </script>

</body>

</html>
